[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

[invariant]
runs = 500
depth = 200
fail_on_revert = false
call_override = false
shrink_run_limit = 0
# Enables edge coverage collection, which is also the trigger for the
# JSON pulse stream emitted when `--show-progress` is NOT set.
show_edge_coverage = true
